<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Puzzle Craft Privacy Policy</title>

  <style>
    :root {
      --bg1: #241733;
      --bg2: #55407e;
      --bg3: #f6bdd8;
      --glass: rgba(255,255,255,.16);
      --glass-2: rgba(255,255,255,.22);
      --line: rgba(255,255,255,.2);
      --text: #fff9ff;
      --muted: rgba(255,249,255,.78);
      --soft: rgba(255,249,255,.62);
      --accent: #a7efff;
      --shadow: rgba(0,0,0,.24);
      font-family: "Segoe UI","SF Pro Text","Noto Sans",Arial,sans-serif;
      color-scheme: light;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.16), transparent 32%),
        radial-gradient(circle at top right, rgba(255,227,210,.15), transparent 26%),
        linear-gradient(135deg, var(--bg1), var(--bg2) 48%, var(--bg3));
      padding: 20px 14px 40px;
    }
    .page { max-width: 980px; margin: 0 auto; }
    .glass {
      background: linear-gradient(135deg, var(--glass-2), var(--glass));
      border: 1px solid var(--line);
      box-shadow: 0 22px 44px var(--shadow), inset 0 1px 0 rgba(255,255,255,.18);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    .hero {
      border-radius: 28px;
      padding: 26px;
      display: grid;
      grid-template-columns: 112px 1fr;
      gap: 18px;
      align-items: center;
    }
    .logo {
      width: 112px;
      height: 112px;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.34);
      background: rgba(255,255,255,.12);
      box-shadow: 0 12px 26px rgba(0,0,0,.2);
    }
    .logo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    h1 { margin: 0; font-size: clamp(28px, 4vw, 40px); letter-spacing: -.03em; }
    h2 { margin: 8px 0 0; font-size: clamp(16px, 2vw, 20px); color: var(--muted); }
    .intro { margin: 14px 0 0; color: var(--muted); line-height: 1.65; font-size: 15px; }
    .chips { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.11);
      border: 1px solid rgba(255,255,255,.18);
      font-size: 13px;
      font-weight: 800;
    }
    .toolbar { margin-top: 18px; display: grid; gap: 12px; }
    .langs {
      border-radius: 22px;
      padding: 14px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .lang-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.1);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 12px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: .18s ease;
      font-size: 13px;
      font-weight: 800;
    }
    .lang-btn img { width: 18px; height: 18px; border-radius: 50%; object-fit: cover; }
    .lang-btn.active {
      background: rgba(105, 210, 255, .22);
      border-color: rgba(167,239,255,.82);
    }
    .note {
      border-radius: 18px;
      padding: 14px 16px;
      color: var(--soft);
      font-size: 13px;
      line-height: 1.6;
    }
    .content { margin-top: 18px; display: grid; gap: 14px; }
    .section { border-radius: 22px; padding: 22px; }
    .section h3 { margin: 0 0 10px; font-size: clamp(18px, 2.2vw, 22px); }
    .section p, .section li { color: var(--muted); font-size: 15px; line-height: 1.72; }
    .section ul { margin: 10px 0 0; padding-left: 20px; }
    .section a { color: var(--accent); font-weight: 700; text-decoration: none; }
    .section a:hover { text-decoration: underline; }
    .footer { margin-top: 18px; border-radius: 22px; padding: 16px 18px; color: var(--soft); font-size: 13px; line-height: 1.6; }
    @media (max-width: 720px) {
      .hero { grid-template-columns: 1fr; padding: 22px; }
      .logo { width: 92px; height: 92px; border-radius: 20px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero glass">
      <div class="logo"><img src="./assets/icon/app_logo.png" alt="Puzzle Craft logo" /></div>
      <div>
        <h1 id="title"></h1>

        <p class="intro" id="intro"></p>
        <div class="chips" id="chips"></div>
      </div>
    </section>

    <div class="toolbar">
      <div class="langs glass" id="langs"></div>
      <div class="note glass" id="note"></div>
    </div>

    <section class="content" id="content"></section>
    <footer class="footer glass" id="footer"></footer>
  </main>

    const order = ["en", "vi", "es", "pt", "ja", "ko"];
    const storageKey = "puzzleCraftPrivacyLang";
    const contactEmailHtml = '<p>Email: <a href="mailto:tuthaotien@gmail.com">tuthaotien@gmail.com</a></p>';

    function preferredLang() {
      const query = new URLSearchParams(location.search).get("lang");
      if (query && t[query]) return query;
      return "en";
    }

    function renderLangButtons(active) {
      const wrap = document.getElementById("langs");
      wrap.innerHTML = "";
      order.forEach((code) => {
        const item = t[code];
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `lang-btn${code === active ? " active" : ""}`;
        btn.innerHTML = `<img src="${item.flag}" alt="${item.label}" /><span>${item.label}</span>`;
        btn.addEventListener("click", () => applyLang(code));
        wrap.appendChild(btn);
      });
    }

    function applyLang(code) {
      const d = t[code] || t.en;
      document.documentElement.lang = code;
      document.title = `${d.subtitle} - ${d.title}`;
      document.getElementById("title").textContent = d.title;
      document.getElementById("subtitle").textContent = d.subtitle;
      document.getElementById("intro").textContent = d.intro;
      document.getElementById("note").textContent = d.note;
      document.getElementById("footer").textContent = d.footer;

      const chips = document.getElementById("chips");
      chips.innerHTML = "";
      d.chips.forEach((text) => {
        const node = document.createElement("span");
        node.className = "chip";
        node.textContent = text;
        chips.appendChild(node);
      });

      const content = document.getElementById("content");
      content.innerHTML = "";
      sections.forEach((key) => {
        const article = document.createElement("article");
        article.className = "section glass";
        const bodyHtml = key === "contact"
          ? `${d[`${key}Html`]}${contactEmailHtml}`
          : d[`${key}Html`];
        article.innerHTML = `<h3>${d[`${key}Title`]}</h3>${bodyHtml}`;
        content.appendChild(article);
      });

      renderLangButtons(code);
      localStorage.setItem(storageKey, code);
    }

    applyLang(preferredLang());
  </script>
